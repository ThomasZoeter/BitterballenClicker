<div class="buildingBlock">
  <img class="backgroundPic" ngSrc="app/assets/upgrades/upgradesIcon.png" alt="upgradesIcon.png" height="300" width="300">
  <div class="buildingsLayer">
    @for (building of buildings;let idx =  $index;track idx) {
      <building-component [building]="building" [buying]="true">
      </building-component>
    }
  </div>
</div>
