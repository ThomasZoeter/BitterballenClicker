<div class="page">
  <div class="left" id="left">
    <BB-screen-component [localStorageUser]="this.localStorageUser">

    </BB-screen-component>

  </div>
  <div class="separator-left">
  </div>
  <div class="right" id="right">
    <buyables-component [buildings]="this.buildings"
                        [upgrades]="this.upgrades">
    </buyables-component>
  </div>
  <div class="separator-right">
  </div>
  <div class="middle" id="middle">
    <middle-screen-component [upgrades]="this.upgrades"
                             [localStorageUser]="this.localStorageUser">
    </middle-screen-component>

    <div class="SinceLastSave" [hidden]="this.hideBBsWhileAwayBlock">
      <p>Bitterballen since you were away: {{ this.BBsWhileAway }}</p>
      <button (click)="hideBBsWhileAwayBlock = true">Ok</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="#left" class="nav-link active">Left</a>
  <a href="#middle" class="nav-link">Middle</a>
  <a href="#right" class="nav-link">Right</a>
</nav>
