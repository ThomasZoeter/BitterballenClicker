<div class="left">
  <BB-screen-component>

  </BB-screen-component>
</div>
<div class="right">
  <buyables-component [buildings]="this.buildings"
                      [upgrades]="this.upgrades">
  </buyables-component>
</div>
<div class="middle">
  <div class="chooseMiddle">
    <button (click)="clickMiddleScreen('Default')">Default</button>
    <button (click)="clickMiddleScreen('Statistics')">Statistics</button>
  </div>
  @if (this.middleScreen === 'Statistics') {
    <div>
      <stats-component [upgradesBought]="this.upgrades"
      ></stats-component>
    </div>
  }
  @if (this.middleScreen === 'Default') {
    <div>
      <p>This is the default screen</p>

    </div>
  }


  <div class="SinceLastSave" [hidden]="this.hideBBsWhileAwayBlock">
    <p>Bitterballen since you were away: {{ this.BBsWhileAway }}</p>
    <button (click)="hideBBsWhileAwayBlock = true">Ok</button>
  </div>
</div>
