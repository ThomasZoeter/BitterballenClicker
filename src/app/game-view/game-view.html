<script>
  const app = document.querySelector("#app");
  const buttons = document.querySelectorAll(".bottom-nav button");
  const pages = ["left", "middle", "right"];

  buttons.forEach(button => {
    button.addEventListener("click", () => {
      const target = document.querySelector("#" + button.dataset.page);

      target.scrollIntoView({
        behavior: "smooth",
        inline: "start",
        block: "nearest"
      });
    });
  });

  app.addEventListener("scroll", () => {
    const index = Math.round(app.scrollLeft / window.innerWidth);

    buttons.forEach(button => button.classList.remove("active"));
    buttons[index].classList.add("active");
  });
</script>
<div class="page">
  <div class="left" id="left">
    <BB-screen-component [localStorageUser]="this.localStorageUser">

    </BB-screen-component>

  </div>
  <div class="separator-left">
  </div>
  <div class="right" id="right">
    <buyables-component [buildings]="this.buildings"
                        [upgrades]="this.upgrades">
    </buyables-component>
  </div>
  <div class="separator-right">
  </div>
  <div class="middle" id="middle">
    <middle-screen-component [upgrades]="this.upgrades"
                             [localStorageUser]="this.localStorageUser">
    </middle-screen-component>

    <div class="SinceLastSave" [hidden]="this.hideBBsWhileAwayBlock">
      <p>Bitterballen since you were away: {{ this.BBsWhileAway }}</p>
      <button (click)="hideBBsWhileAwayBlock = true">Ok</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <button data-page="left" class="active">Left</button>
  <button data-page="middle">Middle</button>
  <button data-page="right">Right</button>
</nav>
